name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  # Opt JS-based actions into Node.js 24 ahead of GitHub's June 2026 forced
  # cutover. Drop this once actions/checkout and actions/setup-go ship a
  # Node-24 default release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          # PAT with `repo` scope on the homebrew-tap repo; required because the
          # default GITHUB_TOKEN cannot push to a *separate* tap repo.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
