name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt JS-based actions into Node.js 24 ahead of GitHub's June 2026 forced
  # cutover. Drop this once actions/checkout and actions/setup-go ship a
  # Node-24 default release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - run: make tools
      - run: make ci
